<head>

<title>HUMAXEV 충전소 관리 CRM</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=ec82drlgxq&submodules=geocoder"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
  :root{--bg:#f3f5f8;--surface:#fff;--surface2:#eef6fb;--border:#d4e5f0;--border2:#b8cfe0;--text:#1b2a4a;--text2:#4a6382;--text3:#94a3b8;--accent:#0e7490;--accent-bg:#eef6fb;--orange:#f97316;--orange-bg:#fff7ed;--danger:#dc2626;--danger-bg:#fef2f2;--warning:#ea580c;--warning-bg:#fff7ed;--caution:#2563eb;--caution-bg:#eff6ff;--success:#16a34a;--success-bg:#f0fdf4;--r:10px;--rs:6px;--header-bg:linear-gradient(135deg,#0f172a,#1e3a5f);--header-text:#fff;--header-sub:rgba(255,255,255,.55);--header-btn-bg:rgba(255,255,255,.08);--header-btn-border:rgba(255,255,255,.2);--header-btn-text:rgba(255,255,255,.85);--overlay-bg:rgba(27,42,74,.4)}
  body.dark{--bg:#0e1a2e;--surface:#152238;--surface2:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--accent:#22d3ee;--accent-bg:rgba(0,180,216,.12);--orange:#fb923c;--orange-bg:rgba(249,115,22,.12);--danger:#f87171;--danger-bg:rgba(248,113,113,.1);--warning:#fb923c;--warning-bg:rgba(251,146,60,.1);--caution:#60a5fa;--caution-bg:rgba(96,165,250,.1);--success:#34d399;--success-bg:rgba(52,211,153,.1);--header-bg:linear-gradient(135deg,#0a1120,#0e1a2e);--header-text:#e2e8f0;--header-sub:rgba(255,255,255,.4);--header-btn-bg:rgba(255,255,255,.06);--header-btn-border:rgba(255,255,255,.15);--header-btn-text:rgba(255,255,255,.7);--overlay-bg:rgba(0,0,0,.6)}
  *{box-sizing:border-box;margin:0;padding:0}body{font-family:'Pretendard',-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
  .header{background:var(--header-bg);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(27,42,74,.15)}
  .logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--header-text)}.logo-dot{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#f97316,#fb923c);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
  .hd-right{display:flex;align-items:center;gap:10px}.hd-count{font-size:12px;color:var(--header-sub);background:var(--header-btn-bg);padding:3px 10px;border-radius:20px}
  .hd-btn{border:1px solid var(--header-btn-border);background:var(--header-btn-bg);color:var(--header-btn-text);border-radius:var(--rs);padding:5px 12px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .2s;font-family:'Pretendard',sans-serif}.hd-btn:hover{background:rgba(255,255,255,.15)}
  .view-toggle{display:flex;gap:0}.view-btn{padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--header-btn-border);background:var(--header-btn-bg);color:var(--header-btn-text);font-family:'Pretendard',sans-serif;transition:all .2s}.view-btn:first-child{border-radius:var(--rs) 0 0 var(--rs)}.view-btn:last-child{border-radius:0 var(--rs) var(--rs) 0}.view-btn.active{background:var(--orange);border-color:var(--orange);color:#fff}
  .region-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:.6rem 1.5rem;display:flex;gap:6px;align-items:center}
  .region-tab{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);transition:all .2s;display:flex;align-items:center;gap:8px}.region-tab:hover{border-color:var(--accent);color:var(--accent)}.region-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(14,116,144,.25)}.region-tab .tab-cnt{font-size:11px;font-weight:600;padding:1px 7px;border-radius:10px;background:rgba(255,255,255,.2)}.region-tab:not(.active) .tab-cnt{background:var(--surface2);color:var(--text3)}.region-tab.all{background:var(--surface2);border-color:var(--border);color:var(--text2)}.region-tab.all.active{background:var(--text);color:#fff;border-color:var(--text)}

  .stat-chip{display:flex;align-items:center;gap:6px;padding:.3rem .8rem;border-radius:20px;border:1px solid;font-size:11px;font-weight:600;cursor:pointer;transition:transform .15s}.stat-chip:hover{transform:translateY(-1px)}.stat-chip.danger{background:var(--danger-bg);border-color:#fecaca;color:var(--danger)}.stat-chip.warning{background:var(--warning-bg);border-color:#fed7aa;color:var(--warning)}.stat-chip.caution{background:var(--caution-bg);border-color:#bfdbfe;color:var(--caution)}.stat-chip.success{background:var(--success-bg);border-color:#bbf7d0;color:var(--success)}.stat-chip.total{background:var(--surface2);border-color:var(--border);color:var(--text2)}.stat-chip.active-filter{outline:2px solid var(--orange);outline-offset:1px}.stat-num{font-size:16px}
  .filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:.6rem 1.5rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .filter-bar input,.filter-bar select{border:1px solid var(--border);border-radius:var(--rs);padding:5px 10px;font-size:12px;color:var(--text);background:var(--surface);outline:none;font-family:'Pretendard',sans-serif}.filter-bar input:focus,.filter-bar select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,116,144,.1)}.filter-bar input{min-width:180px}
  .reset-btn{border:1px solid var(--border);background:var(--surface);color:var(--text2);border-radius:var(--rs);padding:5px 12px;font-size:11px;cursor:pointer;font-family:'Pretendard',sans-serif;font-weight:500}.reset-btn:hover{background:var(--surface2)}
  .main{padding:1rem 1.5rem}.main.hide{display:none}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
  @media(max-width:700px){.grid{grid-template-columns:1fr;gap:8px}.header{padding:0 .75rem;height:48px}.logo{font-size:13px}.hd-count{display:none}.region-tabs{padding:.5rem .75rem;gap:4px}.region-tab{padding:6px 12px;font-size:12px}.filter-bar{padding:.4rem .75rem}.filter-bar input{min-width:100px}.main{padding:.5rem .75rem}}
  .empty{text-align:center;padding:3rem 2rem;color:var(--text3)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;padding:.9rem 1rem}.card:hover{box-shadow:0 4px 16px rgba(27,42,74,.1);border-color:var(--border2);transform:translateY(-2px)}
  .c-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--r) 0 0 var(--r)}.c-bar.danger{background:var(--danger)}.c-bar.warning{background:var(--warning)}.c-bar.caution{background:var(--caution)}.c-bar.success{background:var(--success)}.c-bar.none{background:var(--border)}
  .c-inner{padding-left:8px}.c-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:3px}.c-name{font-weight:700;font-size:13px;line-height:1.4;flex:1;color:var(--text)}.c-chips{display:flex;gap:3px;align-items:center;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
  .chip{font-size:9px;font-weight:700;padding:2px 5px;border-radius:20px;border:1px solid}.chip.grade-a{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8}.chip.grade-b{background:#d1fae5;border-color:#6ee7b7;color:#047857}.chip.grade-c{background:#fef3c7;border-color:#fcd34d;color:#92400e}.chip.grade-d{background:#fed7aa;border-color:#fdba74;color:#c2410c}.chip.grade-e{background:#fecaca;border-color:#fca5a5;color:#dc2626}.chip.grade-f{background:#e5e7eb;border-color:#d1d5db;color:#6b7280}.chip.charger{background:var(--accent-bg);border-color:var(--border);color:var(--accent)}.chip.progress{background:var(--orange-bg);border-color:#fed7aa;color:#c2410c}
  .c-addr{font-size:10px;color:var(--text3);margin-bottom:4px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .c-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}.tag{font-size:10px;padding:1px 6px;border-radius:4px;border:1px solid var(--border);color:var(--text2);background:var(--surface2);font-weight:500}.tag.ok{border-color:#bbf7d0;background:var(--success-bg);color:var(--success)}.tag.no{border-color:#fecaca;background:var(--danger-bg);color:var(--danger)}
  .c-rem-row{display:flex;align-items:baseline;gap:5px;flex-wrap:wrap}.c-rem{font-size:11px;font-weight:700}.c-rem.danger{color:var(--danger)}.c-rem.warning{color:var(--warning)}.c-rem.caution{color:var(--caution)}.c-rem.success{color:var(--success)}.c-rem.none{color:var(--text3)}
  .c-ym{font-size:10px;font-weight:600}.c-ym.danger{color:#ef4444}.c-ym.warning{color:#f97316}.c-ym.caution{color:#3b82f6}.c-ym.success{color:#22c55e}.c-ym.none{color:var(--text3)}
  .c-end{font-size:10px;color:var(--text3);margin-top:1px}
  .c-foot{margin-top:6px;padding-top:6px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:4px}.c-rev{font-size:10px;color:var(--text2)}.c-rev span{font-weight:700;color:var(--text)}
  .dot-mini{display:flex;align-items:flex-end;height:24px;flex:1;max-width:100px}.dot-mini svg{width:100%;height:100%;overflow:visible}
  .sigungu-divider{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:2px 0;margin-top:2px}.sigungu-badge{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-bg);border:1px solid var(--border);padding:1px 10px;border-radius:14px}.sigungu-line{flex:1;height:1px;background:var(--border)}
  /* map */
  #map-container{display:none;width:100%;height:calc(100vh - 170px);position:relative}#map-container.show{display:block}
  .map-loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);padding:20px 40px;border-radius:var(--r);box-shadow:0 4px 20px rgba(0,0,0,.15);font-size:14px;font-weight:600;color:var(--text);z-index:10;display:flex;align-items:center;gap:10px}
  .map-spinner{width:20px;height:20px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  .map-legend{position:absolute;bottom:20px;left:20px;background:var(--surface);border-radius:var(--rs);padding:10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.12);z-index:5;font-size:11px;display:flex;flex-direction:column;gap:4px}.map-legend-item{display:flex;align-items:center;gap:6px}.map-legend-dot{width:10px;height:10px;border-radius:50%}
  /* panel */
  #overlay{display:none;position:fixed;inset:0;background:var(--overlay-bg);z-index:200;align-items:stretch;justify-content:flex-end;backdrop-filter:blur(4px)}#overlay.open{display:flex}
  #panel{width:min(720px,100vw);background:var(--surface);overflow-y:auto;height:100vh;display:flex;flex-direction:column;box-shadow:-4px 0 32px rgba(0,0,0,.2)}
  .ph{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;display:flex;align-items:center;gap:12px}
  .p-close{width:32px;height:32px;border:1px solid var(--border);border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}.p-close:hover{background:var(--surface2);border-color:var(--border2)}.p-close svg{width:14px;height:14px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round}
  .p-title{flex:1}.p-name{font-size:17px;font-weight:700;line-height:1.3;color:var(--text)}.p-sub{font-size:12px;color:var(--text3);margin-top:2px}
  .p-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}.badge{display:inline-flex;align-items:center;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}.badge.ok{background:var(--success-bg);color:var(--success)}.badge.no{background:var(--danger-bg);color:var(--danger)}.badge.grade{background:var(--accent-bg);color:var(--accent)}
  .pb{padding:1.25rem 1.5rem;flex:1}.sec{margin-bottom:1.5rem}.sec-t{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .sec-edit-btn{font-size:11px;font-weight:600;color:var(--orange);background:var(--orange-bg);border:1px solid #fed7aa;border-radius:12px;padding:2px 10px;cursor:pointer;text-transform:none;letter-spacing:0}.sec-edit-btn:hover{background:#fed7aa}
  .sec-save-btn{font-size:11px;font-weight:600;color:#fff;background:linear-gradient(135deg,#f97316,#fb923c);border:none;border-radius:12px;padding:3px 12px;cursor:pointer;text-transform:none;letter-spacing:0}
  .sec-cancel-btn{font-size:11px;font-weight:600;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2px 10px;cursor:pointer;text-transform:none;letter-spacing:0}
  .dg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.di{background:var(--surface2);border-radius:var(--rs);padding:.6rem .8rem}.di.full{grid-column:1/-1}.di-l{font-size:11px;color:var(--text3);margin-bottom:2px}.di-v{font-size:13px;font-weight:600;color:var(--text);word-break:break-all;white-space:pre-wrap}
  .p-inp{width:100%;border:1px solid var(--border);border-radius:var(--rs);padding:5px 8px;font-size:13px;color:var(--text);background:var(--surface);outline:none;font-family:'Pretendard',sans-serif;line-height:1.5}.p-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(14,116,144,.1)}.p-ta{resize:vertical;min-height:80px}
  .note-box{background:#fffbeb;border:1px solid #fde68a;border-radius:var(--rs);padding:.7rem 1rem;font-size:13px;color:#92400e;line-height:1.6;white-space:pre-wrap}body.dark .note-box{background:rgba(253,224,71,.08);border-color:rgba(253,224,71,.2);color:#fbbf24}
  .note-edit{width:100%;border:1.5px solid var(--orange);border-radius:var(--rs);padding:.7rem 1rem;font-size:13px;color:var(--text);background:var(--surface);outline:none;font-family:'Pretendard',sans-serif;line-height:1.6;resize:vertical;min-height:100px}.note-edit:focus{box-shadow:0 0 0 3px rgba(249,115,22,.15)}
  .dot-chart-wrap{background:var(--surface2);border-radius:var(--rs);padding:20px 20px 8px}
  .update-history-toggle{font-size:11px;color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-top:4px;font-weight:600}.update-history-toggle:hover{text-decoration:underline}
  .update-history{display:none;margin-top:6px;padding:6px 8px;background:var(--surface2);border-radius:var(--rs);font-size:12px;color:var(--text3)}.update-history.show{display:block}
  .editing-banner{background:var(--orange-bg);border:1px solid #fed7aa;border-radius:var(--rs);padding:6px 12px;font-size:12px;color:#c2410c;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .rev-update-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:#16a34a;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:1px 7px;margin-left:6px}

  .backup-bar{background:var(--surface);border-top:1px solid var(--border);padding:8px 1.5rem;display:flex;gap:8px;align-items:center;position:fixed;bottom:0;left:0;right:0;z-index:90;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
  .backup-btn{border:1px solid var(--border);background:var(--surface);color:var(--text2);border-radius:var(--rs);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Pretendard',sans-serif;display:flex;align-items:center;gap:5px;transition:all .15s}
  .backup-btn:hover{background:var(--surface2);border-color:var(--border2)}
  .backup-btn.export{background:var(--accent);color:#fff;border-color:var(--accent)}.backup-btn.export:hover{opacity:.9}
  .backup-btn.import{background:var(--orange-bg);color:var(--orange);border-color:#fed7aa}.backup-btn.import:hover{background:#fed7aa}
  .backup-status{font-size:11px;color:var(--success);font-weight:600;margin-left:auto;opacity:0;transition:opacity .3s}
  .backup-status.show{opacity:1}
  .main{padding-bottom:60px}
  #backup-file{display:none}


  /* 점검일자 삭제 버튼 */
  .upd-del-btn{background:none;border:none;cursor:pointer;font-size:12px;margin-left:6px;opacity:.5;padding:2px 4px;border-radius:4px;transition:all .15s}
  .upd-del-btn:hover{opacity:1;background:var(--danger-bg);color:var(--danger)}
  .upd-hist-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;border-bottom:1px solid var(--border);font-size:11px}
  .upd-hist-row:last-child{border-bottom:none}
  /* 카드 최근 점검일자 - 부각 */
  .c-visit{font-size:11px;font-weight:700;margin-top:5px;padding:5px 9px;border-radius:6px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;border-left:3px solid currentColor}
  .c-visit.recent{color:#15803d;background:#dcfce7;border-left-color:#16a34a}
  .c-visit.old{color:#9a3412;background:#ffedd5;border-left-color:#ea580c}
  .c-visit.none{color:#64748b;background:#f1f5f9;border-left-color:#94a3b8;font-weight:600}
  .c-visit::before{content:'📅';font-size:11px;margin-right:1px}
  .v-tag{font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px;letter-spacing:.2px;margin-left:auto}
  .v-tag.ok{background:#16a34a;color:#fff}
  .v-tag.warn{background:#ea580c;color:#fff}
  body.dark .c-visit.recent{color:#86efac;background:rgba(22,163,74,.18);border-left-color:#22c55e}
  body.dark .c-visit.old{color:#fdba74;background:rgba(234,88,12,.18);border-left-color:#f97316}
  body.dark .c-visit.none{color:#cbd5e1;background:rgba(148,163,184,.15);border-left-color:#94a3b8}
  /* 통계칩 - 점검 관련 */
  .stat-chip.visit-recent{border-color:#86efac;color:#166534}
  .stat-chip.visit-recent .stat-num{color:#16a34a}
  .stat-chip.visit-old{border-color:#fdba74;color:#9a3412}
  .stat-chip.visit-old .stat-num{color:#ea580c}
  .stat-chip.visit-never{border-color:#cbd5e1;color:#475569}
  .stat-chip.visit-never .stat-num{color:#64748b}
  .stat-chip.charger{border-color:#93c5fd;color:#1e40af;cursor:default}
  .stat-chip.charger .stat-num{color:#2563eb}
  body.dark .stat-chip.visit-recent{color:#86efac}
  body.dark .stat-chip.visit-old{color:#fdba74}
  body.dark .stat-chip.visit-never{color:#cbd5e1}
  body.dark .stat-chip.charger{color:#93c5fd}
  /* 헤더 카운트 bold */
  .hd-count b{color:var(--header-fg);font-weight:700}

  /* 지역탭 우측 - 총 충전기 카운트 */
  .region-charger-info{margin-left:auto;display:flex;align-items:baseline;gap:5px;padding:7px 16px;background:linear-gradient(135deg,#0e7490 0%,#0891b2 100%);border-radius:8px;color:#fff;box-shadow:0 2px 8px rgba(14,116,144,.25)}
  .region-charger-info .rci-label{font-size:11px;font-weight:600;opacity:.9}
  .region-charger-info .rci-num{font-size:18px;font-weight:800;letter-spacing:-.3px}
  .region-charger-info .rci-unit{font-size:11px;font-weight:600;opacity:.9}
  body.dark .region-charger-info{background:linear-gradient(135deg,#155e75 0%,#0e7490 100%);box-shadow:0 2px 8px rgba(0,0,0,.4)}
  @media(max-width:640px){
    .region-charger-info{padding:5px 11px}
    .region-charger-info .rci-num{font-size:15px}
    .region-charger-info .rci-label,.region-charger-info .rci-unit{font-size:10px}
  }
</style>
</head>
<body>
<div class="header">
  <div class="logo"><div class="logo-dot">H</div>HUMAXEV 충전소 관리 CRM</div>
  <div class="hd-right">
    <span class="hd-count" id="hd-count"></span>

function visitStatus(updateDate){
  if(!updateDate)return 'never';
  // extract first yyyy-mm-dd from string (may be "2026-04-09 박범수" etc.)
  const m=String(updateDate).match(/(\d{4})[-.](\d{1,2})[-.](\d{1,2})/);

  const d=new Date(Date.UTC(+m[1],+m[2]-1,+m[3],12,0,0));
  if(isNaN(d))return 'never';
  const diff=Math.round((TODAY-d)/86400000);
  if(diff<0)return 'recent';
  return diff<=90?'recent':'old';
}

    return{_idx:idx,do_:g(r,C.do_),sigungu:g(r,C.sigungu),name,parking:g(r,C.parking),installed:g(r,C.installed),slow_:g(r,C.slow_),fast:g(r,C.fast),expYear:g(r,C.expYear),endDate:fmt(endObj),daysLeft:days,urgency:urg(days),rev1:rd?rd.r1:gNum(r,C.rev1),rev2:rd?rd.r2:gNum(r,C.rev2),rev3:rd?rd.r3:gNum(r,C.rev3),fastRevenue:hasFast?g(r,C.fastRevenue):'',grade:g(r,C.grade),progress:g(r,C.progress),updateDate:fmt(parseDate(r,C.updateDate)),updateHistory:[],visitor:g(r,C.visitor),otherCPO:g(r,C.otherCPO),otherBrand:g(r,C.otherBrand),hevParking:g(r,C.hevParking),fieldNote:g(r,C.fieldNote),etcNote:g(r,C.etcNote),address:g(r,C.address),directions:g(r,C.directions),memo:g(r,C.memo),etcInfo:g(r,C.etcInfo)};});

function buildRegionTabs(){const cnt={};const ch={};REGION_ORDER.forEach(r=>{cnt[r]=0;ch[r]=0;});let totalCh=0;locations.forEach(l=>{if(cnt[l.do_]!==undefined){cnt[l.do_]++;ch[l.do_]+=Number(l.installed)||0;}totalCh+=Number(l.installed)||0;});const tabs=document.getElementById('region-tabs');const showCh=currentRegion?ch[currentRegion]:totalCh;const showCnt=currentRegion?cnt[currentRegion]:locations.length;let h=`<div class="region-tab all ${currentRegion===''?'active':''}" onclick="setRegion('')">전체 <span class="tab-cnt">${locations.length}</span></div>`;REGION_ORDER.forEach(r=>{h+=`<div class="region-tab ${currentRegion===r?'active':''}" onclick="setRegion('${r}')">${REGION_LABEL[r]} <span class="tab-cnt">${cnt[r]}</span></div>`;});h+=`<div class="region-charger-info"><span class="rci-label">총 충전기</span><span class="rci-num">${showCh.toLocaleString()}</span><span class="rci-unit">기</span></div>`;tabs.innerHTML=h;}

function dotMini(vals){const data=vals.map((v,i)=>v!==null?{v,i}:null).filter(Boolean);if(!data.length)return'';const max=Math.max(...data.map(d=>d.v),1);const min=Math.min(...data.map(d=>d.v));const range=max-min||1;const w=90,h=22,pad=5;const pts=data.map(d=>{const x=pad+d.i*((w-2*pad)/Math.max(vals.length-1,1));const y=h-pad-((d.v-min)/range)*(h-2*pad);return{x,y};});let path='';pts.forEach((p,i)=>{path+=(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1);});let svg=`<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;if(pts.length>1)svg+=`<path d="${path}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" opacity=".4"/>`;pts.forEach(p=>{svg+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.5" fill="var(--accent)"/>`;});svg+='</svg>';return`<div class="dot-mini">${svg}</div>`;}
function dotFull(items){const data=items.map((it,i)=>it.val!==null?{...it,i}:null).filter(Boolean);if(!data.length)return'';const max=Math.max(...data.map(d=>d.val),1);const min=Math.min(...data.map(d=>d.val),0);const range=max-min||1;const w=300,h=100,padX=10,padY=22,cw=w-2*padX,ch=h-2*padY;const pts=data.map(d=>{const x=padX+d.i*(cw/Math.max(items.length-1,1));const y=padY+ch-((d.val-min)/range)*ch;return{x,y,...d};});let path='';pts.forEach((p,i)=>{path+=(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1);});let area=path+`L${pts[pts.length-1].x.toFixed(1)},${h-padY} L${pts[0].x.toFixed(1)},${h-padY} Z`;let svg=`<svg viewBox="0 0 ${w} ${h+36}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;overflow:visible"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity=".15"/><stop offset="100%" stop-color="var(--accent)" stop-opacity=".02"/></linearGradient></defs>`;for(let i=0;i<=3;i++){const y=padY+i*(ch/3);svg+=`<line x1="${padX}" y1="${y}" x2="${w-padX}" y2="${y}" stroke="var(--border)" stroke-width=".5" stroke-dasharray="3,3"/>`;}if(pts.length>1){svg+=`<path d="${area}" fill="url(#ag)"/>`;svg+=`<path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;}pts.forEach(p=>{svg+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="5.5" fill="var(--accent)" stroke="var(--surface)" stroke-width="2.5"/>`;svg+=`<text x="${p.x.toFixed(1)}" y="${p.y.toFixed(1)-14}" text-anchor="middle" fill="var(--text)" font-size="12" font-weight="700" font-family="Pretendard,sans-serif">${fmtRev(p.val)}원</text>`;svg+=`<text x="${p.x.toFixed(1)}" y="${h+16}" text-anchor="middle" fill="var(--text3)" font-size="11" font-weight="500" font-family="Pretendard,sans-serif">${p.label}</text>`;});svg+='</svg>';return`<div class="dot-chart-wrap">${svg}</div>`;}

// ── Naver Map ──
function initMap(){const center=new naver.maps.LatLng(35.15,126.85);mapInstance=new naver.maps.Map('naver-map',{center,zoom:9,zoomControl:true,zoomControlOptions:{position:naver.maps.Position.TOP_RIGHT}});mapInfoWindow=new naver.maps.InfoWindow({borderWidth:0,backgroundColor:'transparent',disableAnchor:true,pixelOffset:new naver.maps.Point(0,-8)});mapReady=true;updateMapMarkers();}

async function updateMapMarkers(){if(!mapInstance)return;mapMarkers.forEach(m=>m.setMap(null));mapMarkers=[];const locs=filtered;const loading=document.getElementById('map-loading');const loadText=document.getElementById('map-loading-text');loading.style.display='flex';const bounds=new naver.maps.LatLngBounds();let done=0;
  for(const l of locs){const addr=l.address||`${l.do_} ${l.sigungu}`;if(!addr)continue;let coord=geocodeCache[addr];if(!coord){coord=await geocodeAddr(addr);if(coord)geocodeCache[addr]=coord;}if(!coord)continue;
    const ll=new naver.maps.LatLng(coord.y,coord.x);bounds.extend(ll);const color=URG_COLORS[l.urgency]||URG_COLORS.none;
    const marker=new naver.maps.Marker({position:ll,map:mapInstance,icon:{content:`<div style="width:14px;height:14px;background:${color};border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.3);cursor:pointer"></div>`,anchor:new naver.maps.Point(7,7)}});
    const loc=l;naver.maps.Event.addListener(marker,'click',()=>{const ym=daysToYM(loc.daysLeft);mapInfoWindow.setContent(`<div style="background:var(--surface);border-radius:10px;padding:12px 16px;box-shadow:0 4px 20px rgba(0,0,0,.15);max-width:280px;font-family:Pretendard,sans-serif"><div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">${loc.name}</div><div style="font-size:11px;color:var(--text3);margin-bottom:6px">${loc.do_} ${loc.sigungu}</div><div style="font-size:12px;font-weight:700;color:${color};margin-bottom:4px">${urgLabel(loc.daysLeft)} ${ym||''}</div><div style="font-size:11px;color:var(--text2)">충전기 ${loc.installed||'-'}기 · 3월 ${fmtRev(loc.rev3)}원/기</div>${loc.grade?`<div style="font-size:11px;color:var(--text3);margin-top:2px">${loc.grade}등급${loc.progress?' · '+loc.progress:''}</div>`:''}</div>`);mapInfoWindow.open(mapInstance,marker);});
    mapMarkers.push(marker);done++;if(done%15===0)loadText.textContent=`주소 변환 중... (${done}/${locs.length})`;
  }loading.style.display='none';if(done>0)mapInstance.fitBounds(bounds,{top:60,right:60,bottom:60,left:60});}

function geocodeAddr(addr){return new Promise(resolve=>{naver.maps.Service.geocode({query:addr},function(status,response){if(status!==naver.maps.Service.Status.OK||!response.v2.addresses.length){const short=addr.split(/[,(]/)[0].trim();if(short!==addr&&short.length>4){naver.maps.Service.geocode({query:short},function(s2,r2){if(s2===naver.maps.Service.Status.OK&&r2.v2.addresses.length){const a=r2.v2.addresses[0];resolve({x:parseFloat(a.x),y:parseFloat(a.y)});}else resolve(null);});}else resolve(null);return;}const a=response.v2.addresses[0];resolve({x:parseFloat(a.x),y:parseFloat(a.y)});});});}

// ── Detail Panel ──
function openDetail(li){currentLi=li;editSections={};renderPanel();overlay.classList.add('open');document.body.style.overflow='hidden';history.pushState({panel:true},'');}
window.addEventListener('popstate',function(){if(overlay.classList.contains('open'))closeDetail();});
function closeDetail(){overlay.classList.remove('open');document.body.style.overflow='';renderGrid();}
function startEdit(s){editSections[s]=true;renderPanel();}function cancelEdit(s){delete editSections[s];renderPanel();}
function saveEdit(s){const l=filtered[currentLi];if(!l)return;document.querySelectorAll(`[data-section="${s}"] [data-field]`).forEach(el=>{const f=el.dataset.field,val=el.value;if(f==='updateDate'&&val!==l.updateDate&&l.updateDate){if(!l.updateHistory)l.updateHistory=[];l.updateHistory.unshift(l.updateDate);}l[f]=val;});
  // Firebase에 저장
  const fbFields={};EDITABLE_FIELDS.forEach(f=>{if(l[f]!==undefined)fbFields[f]=l[f];});if(l.updateHistory&&l.updateHistory.length)fbFields.updateHistory=l.updateHistory;fbSave(l.name,fbFields);
  delete editSections[s];const progs=[...new Set(locations.map(l2=>l2.progress).filter(Boolean))].sort();const psel=document.getElementById('f-progress');const cv=psel.value;psel.innerHTML='<option value="">전체 진행</option>';progs.forEach(p=>psel.innerHTML+=`<option value="${p}">${p}</option>`);psel.value=cv;renderPanel();}
function toggleHistory(){const e=document.getElementById('update-hist');if(e)e.classList.toggle('show');const a=document.getElementById('hist-arrow');if(a)a.textContent=e.classList.contains('show')?'▲':'▼';}

function deleteCurrentUpdate(){
  const l=filtered[currentLi];if(!l)return;
  if(!confirm(`현재 점검일자 "${l.updateDate}"를 삭제하시겠습니까?\n(이전 기록이 있으면 가장 최근 기록이 현재값으로 승격됩니다)`))return;
  if(l.updateHistory&&l.updateHistory.length>0){
    l.updateDate=l.updateHistory.shift();
  }else{
    l.updateDate='';
  }
  const fbFields={};EDITABLE_FIELDS.forEach(f=>{if(l[f]!==undefined)fbFields[f]=l[f];});fbFields.updateHistory=l.updateHistory||[];fbSave(l.name,fbFields);
  renderPanel();
}

function deleteUpdateHistory(idx){
  const l=filtered[currentLi];if(!l||!l.updateHistory)return;
  const target=l.updateHistory[idx];
  if(!confirm(`이전 기록 "${target}"를 삭제하시겠습니까?`))return;
  l.updateHistory.splice(idx,1);
  const fbFields={};EDITABLE_FIELDS.forEach(f=>{if(l[f]!==undefined)fbFields[f]=l[f];});fbFields.updateHistory=l.updateHistory;fbSave(l.name,fbFields);
  renderPanel();
}

function renderPanel(){const li=currentLi;if(li<0)return;const l=filtered[li];if(!l)return;const hasFast=Number(l.fast)>0;
  function fld(key,label,full){const v=l[key]??'';return`<div class="di${full?' full':''}"><div class="di-l">${label}</div><div class="di-v">${v||'-'}</div></div>`;}
  function fldEdit(sec,key,label,full,multi){const v=l[key]??'';const esc=String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');if(editSections[sec])return multi?`<div class="di${full?' full':''}"><div class="di-l">${label}</div><textarea class="p-inp p-ta" data-field="${key}" data-section="${sec}">${esc}</textarea></div>`:`<div class="di${full?' full':''}"><div class="di-l">${label}</div><input class="p-inp" data-field="${key}" data-section="${sec}" value="${esc}"></div>`;return`<div class="di${full?' full':''}"><div class="di-l">${label}</div><div class="di-v">${v||'-'}</div></div>`;}
  function secHd(sec,label){if(editSections[sec])return`<div class="sec-t">${label} <button class="sec-save-btn" onclick="saveEdit('${sec}')">저장</button><button class="sec-cancel-btn" onclick="cancelEdit('${sec}')">취소</button></div>`;return`<div class="sec-t">${label} <button class="sec-edit-btn" onclick="startEdit('${sec}')">✏️ 편집</button></div>`;}
  const revChart=dotFull([{label:"'26년 1월",val:l.rev1},{label:"'26년 2월",val:l.rev2},{label:"'26년 3월",val:l.rev3}]);
  let upHtml=`<div class="di-v">${l.updateDate||'-'}${l.updateDate?`<button class="upd-del-btn" onclick="event.stopPropagation();deleteCurrentUpdate()" title="현재 점검일자 삭제">🗑</button>`:''}</div>`;if(l.updateHistory&&l.updateHistory.length>0){upHtml+=`<div class="update-history-toggle" onclick="toggleHistory()">이전 기록 (${l.updateHistory.length}건) <span id="hist-arrow">▼</span></div><div class="update-history" id="update-hist">${l.updateHistory.map((d,hi)=>`<div class="upd-hist-row"><span>${d}</span><button class="upd-del-btn" onclick="deleteUpdateHistory(${hi})" title="이전 기록 삭제">🗑</button></div>`).join('')}</div>`;}
  function noteSec(sec,label,field){const v=l[field]||'';if(editSections[sec]){const esc=v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');return`<div class="sec" data-section="${sec}">${secHd(sec,label)}<textarea class="note-edit" data-field="${field}" data-section="${sec}">${esc}</textarea></div>`;}return`<div class="sec" data-section="${sec}">${secHd(sec,label)}${v?`<div class="note-box">${v}</div>`:`<div class="note-box" style="color:var(--text3);font-style:italic">내용 없음</div>`}</div>`;}
  document.getElementById('panel').innerHTML=`<div class="ph"><div class="p-close" onclick="closeDetail()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div><div class="p-title"><div class="p-name">${l.name||'-'}</div><div class="p-sub">${l.do_} ${l.sigungu} · 충전기 ${l.installed||'-'}기</div></div><div class="p-badges">${l.grade?`<span class="badge grade">${l.grade} 등급</span>`:''}<span class="badge ${isParking(l.hevParking)?'ok':'no'}">${isParking(l.hevParking)?'병행주차 O':'병행주차 X'}</span></div></div>
    <div class="pb"><div class="sec"><div class="sec-t">기본 정보</div><div class="dg">${fld('name','충전소명',true)}${fld('do_','지역')}${fld('sigungu','시구군')}${fld('address','주소',true)}${fld('parking','총 주차면')}${fld('installed','설치기기')}${fld('slow_','완속')}${fld('fast','급속')}${fld('grade','등급')}${fld('expYear','계약만료(년)')}</div></div>
    <div class="sec"><div class="sec-t">계약 정보</div><div class="dg">${fld('endDate','만료일')}<div class="di"><div class="di-l">잔여</div><div class="di-v"><span class="c-rem ${l.urgency}" style="font-size:15px">${urgLabel(l.daysLeft)}</span> <span class="c-ym ${l.urgency}">${daysToYM(l.daysLeft)||''}</span></div></div></div></div>
    <div class="sec"><div class="sec-t">1기당 평균 완속매출 <span class="rev-update-badge">● 3월 최신</span></div>${revChart}${hasFast&&l.fastRevenue?`<div style="margin-top:10px"><div class="di full"><div class="di-l">급속 매출</div><div class="di-v" style="font-size:14px;color:var(--orange);font-weight:700">${fmtRevFull(Number(l.fastRevenue)||l.fastRevenue)}</div></div></div>`:''}</div>
    <div class="sec" data-section="visit">${secHd('visit','진행 · 방문')}${editSections.visit?'<div class="editing-banner">✏️ 편집 모드</div>':''}<div class="dg" data-section="visit">${fldEdit('visit','progress','진행내용')}${fldEdit('visit','visitor','방문자')}${editSections.visit?`<div class="di"><div class="di-l">Update</div><input class="p-inp" data-field="updateDate" data-section="visit" value="${(l.updateDate||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;')}"></div>`:`<div class="di"><div class="di-l">Update</div>${upHtml}</div>`}${fldEdit('visit','otherCPO','지상 타사')}${fldEdit('visit','otherBrand','타사 브랜드')}${fldEdit('visit','hevParking','HEV 병행주차')}</div></div>
    ${noteSec('fieldNote','현장확인 / 진행사항','fieldNote')}${noteSec('etcNote','기타사항','etcNote')}
    <div class="sec" data-section="extra">${secHd('extra','부가 정보')}${editSections.extra?'<div class="editing-banner">✏️ 편집 모드</div>':''}<div class="dg" data-section="extra">${fldEdit('extra','address','도로명 주소',true,true)}${fldEdit('extra','directions','찾아가는 정보',true,true)}${fldEdit('extra','memo','메모',true,true)}${fldEdit('extra','etcInfo','기타정보',true,true)}</div></div></div>`;
}

function b64ToArrayBuffer(b64){const bin=atob(b64);const buf=new ArrayBuffer(bin.length);const view=new Uint8Array(buf);for(let i=0;i<bin.length;i++)view[i]=bin.charCodeAt(i);return buf;}

function initFromData(){
  const today = new Date();
  locations = LOCATIONS_INITIAL.map((d, idx) => {
    let daysLeft = null;
    if(d.endDate){
      const end = new Date(d.endDate + 'T12:00:00Z');
      if(!isNaN(end)) daysLeft = Math.round((end - today) / 86400000);
    }
    return {
      ...d,
      _idx: idx,
      daysLeft: daysLeft,
      urgency: urg(daysLeft),
      updateHistory: d.updateHistory || []
    };
  });
  locations.sort((a,b)=>{
    const ai=REGION_ORDER.indexOf(a.do_),bi=REGION_ORDER.indexOf(b.do_);
    if(ai!==bi)return(ai===-1?99:ai)-(bi===-1?99:bi);
    return(a.sigungu||'').localeCompare(b.sigungu||'','ko');
  });
  buildRegionTabs();buildFilters();buildStats();applyFilters();
  fbLoadAndApply();
}

    '현장확인 / 진행사항','기타사항','도로명 주소','찾아가는 정보','메모','기타정보'
  ];
  const rows = locations.map(l => [
    l.no||'', l.do_||'', l.sigungu||'', l.name||'', l.parking||'', l.ratio||'', l.diff||'',
    l.installed||'', l.slow_||'', l.fast||'', l.expYear||'', l.endDate||'',
    (l.rev1!==null&&l.rev1!==undefined)?l.rev1:'',
    (l.rev2!==null&&l.rev2!==undefined)?l.rev2:'',
    (l.rev3!==null&&l.rev3!==undefined)?l.rev3:'',
    l.fastRevenue||'', l.grade||'', l.progress||'', l.updateDate||'', l.visitor||'',
    l.otherCPO||'', l.otherBrand||'', l.hevParking||'', l.fieldNote||'', l.etcNote||'',
    l.address||'', l.directions||'', l.memo||'', l.etcInfo||''
  ]);
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws['!cols'] = [
    {wch:5},{wch:6},{wch:8},{wch:22},{wch:8},{wch:6},{wch:8},{wch:8},{wch:6},{wch:6},
    {wch:8},{wch:12},{wch:14},{wch:14},{wch:14},{wch:16},{wch:8},{wch:10},{wch:12},{wch:8},
    {wch:8},{wch:10},{wch:12},{wch:30},{wch:20},{wch:30},{wch:20},{wch:15},{wch:15}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '전라_충전소관리');
  const now = new Date();
  const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb, `HUMAXEV_데이터베이스_${dateStr}.xlsx`);
  showBackupStatus('엑셀 파일 내보내기 완료!');
}

// ── Backup / Restore ──
function exportBackup(){
  const data={version:1,exportDate:new Date().toISOString(),totalLocations:locations.length,edits:{}};
  const editableFields=['progress','visitor','updateDate','otherCPO','otherBrand','hevParking','fieldNote','etcNote','address','directions','memo','etcInfo'];
  locations.forEach((l)=>{
    const edited={};
    editableFields.forEach(f=>{if(l[f])edited[f]=l[f];});
    if(l.updateHistory&&l.updateHistory.length)edited.updateHistory=l.updateHistory;
    if(Object.keys(edited).length)data.edits[l.name]=edited;
  });
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;
  const now=new Date();
  a.download=`HUMAXEV_CRM_백업_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);
  showBackupStatus('백업 파일 저장 완료!');
}

function importBackup(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.edits){alert('올바른 백업 파일이 아닙니다.');return;}
      let applied=0;
      const editableFields=['progress','visitor','updateDate','otherCPO','otherBrand','hevParking','fieldNote','etcNote','address','directions','memo','etcInfo','updateHistory'];
      locations.forEach(l=>{
        const edit=data.edits[l.name];
        if(edit){editableFields.forEach(f=>{if(edit[f]!==undefined)l[f]=edit[f];});applied++;}
      });
      const progs=[...new Set(locations.map(l2=>l2.progress).filter(Boolean))].sort();
      const psel=document.getElementById('f-progress');const cv=psel.value;
      psel.innerHTML='<option value="">전체 진행</option>';
      progs.forEach(p=>psel.innerHTML+=`<option value="${p}">${p}</option>`);
      psel.value=cv;
      applyFilters();
      showBackupStatus(`복원 완료! ${applied}개소 적용 (${data.exportDate?.substring(0,10)||''})`);
    }catch(err){alert('파일 읽기 오류: '+err.message);}
  };
  reader.readAsText(file);
  e.target.value='';
}

function showBackupStatus(msg){
  const el=document.getElementById('backup-status');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),4000);
}

// ── 시작 ──
initFromData();
</script>
